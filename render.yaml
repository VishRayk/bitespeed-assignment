services:
  - type: web
    name: bitespeed-identity-reconciliation
    env: node
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bitespeed-db
          property: connectionString

databases:
  - name: bitespeed-db
    databaseName: bitespeed
    user: bitespeeduser
